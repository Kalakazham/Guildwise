name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pull request diff
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore Guildwise.sln

      - name: Restore local tools
        run: dotnet tool restore

      - name: Code quality guardrails
        run: pwsh -NoProfile -File tools/check-code-quality.ps1

      - name: Format error gate
        run: dotnet format Guildwise.sln --verify-no-changes --severity error --no-restore

      - name: Build
        run: dotnet build Guildwise.sln --no-restore

      - name: Test
        run: dotnet test Guildwise.sln --no-build
