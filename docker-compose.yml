services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: guildwise
      POSTGRES_USER: guildwise
      POSTGRES_PASSWORD: guildwise
    ports:
      - "55432:5432"
    volumes:
      - guildwise_postgres_data:/var/lib/postgresql/data

volumes:
  guildwise_postgres_data:
